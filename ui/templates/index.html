<!DOCTYPE html>
<html>
<head>
    <title>AI Manager Assistant</title>
</head>

<body>

<h1>Employee Task Management Assistant</h1>

<form method="post" action="/ask">
    <input type="text" name="query" placeholder="Enter your request here..." style="width:400px">
    <button type="submit">Submit</button>
</form>

<br>

<h3>Response:</h3>

{% if response %}
    {% if response is string %}
        <p>{{ response }}</p>
    {% else %}
        <pre>{{ response | tojson(indent=2) }}</pre>
    {% endif %}
{% endif %}

</body>
</html>
